# ci.yml
name: CICD-Databricks

on:
  pull_request:
    branches: [dev, test, prod]
  push:
    branches: [dev, test, prod]
  workflow_dispatch:
    inputs:
      maturity_override:
        description: "Override maturity checks for this run: none|warn_only|skip (only used by ci-test)"
        required: false
        default: "none"
        type: choice
        options: [none, warn_only, skip]

permissions:
  contents: read

concurrency:
  group: cicd-databricks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  bundle_validate_dev:
    if: ${{ github.ref_name == 'dev' || (github.event_name == 'pull_request' && github.base_ref == 'dev') }}
    name: bundle-validate-dev
    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: DataBricks-Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.277.0
        with:
          version: 0.277.0
      - name: Validate bundle (dev)
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t dev

  bundle_validate_test:
    if: ${{ github.ref_name == 'test' || (github.event_name == 'pull_request' && (github.base_ref == 'test' || github.base_ref == 'prod')) }}
    name: bundle-validate-test
    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: DataBricks-Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.277.0
        with:
          version: 0.277.0
      - name: Validate bundle (test)
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t test

  bundle_validate_prod:
    if: ${{ github.event_name == 'push' && github.ref_name == 'prod' }}
    name: bundle-validate-prod
    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: DataBricks-Prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.277.0
        with:
          version: 0.277.0
      - name: Validate bundle (prod)
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t prod

  ci_dev:
    if: ${{ github.ref_name == 'dev' || (github.event_name == 'pull_request' && github.base_ref == 'dev') }}
    name: ci-dev
    needs: [unit_tests, bundle_validate_dev]
    uses: EricAustinBarber/sundt-edm-cicd-platform/.github/workflows/reusable-databricks.yml@81cdf941de0fae03687fe5cc7bba08c3501dd183
    with:
      mode: ci-dev
      bundle_path: databricks
      target: dev
      environment_name: DataBricks-Dev
      run_post_deployment_tests: true
      post_deploy_summary_output: both
      run_post_deploy_smoke: true
      smoke_mode: bundle-run
      smoke_job_key: smoke
      run_post_deploy_bundle_jobs: true
      post_deploy_bundle_jobs_json: |
        [
          {
            "job_key": "quality_scorecard_deploy",
            "params": {
              "env": "dev"
            }
          },
          {
            "job_key": "maturity_scorecard_status_load",
            "params": {
              "env": "dev",
              "updated_by": "bundle"
            }
          },
          {
            "job_key": "maturity_scorecard_eval",
            "params": {
              "env": "dev",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}"
            }
          }
        ]
    secrets:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}

  ci_test:
    if: ${{ github.ref_name == 'test' || (github.event_name == 'pull_request' && (github.base_ref == 'test' || github.base_ref == 'prod')) }}
    name: ci-test
    needs: [unit_tests, bundle_validate_test]
    uses: EricAustinBarber/sundt-edm-cicd-platform/.github/workflows/reusable-databricks.yml@81cdf941de0fae03687fe5cc7bba08c3501dd183
    with:
      mode: ci-test
      bundle_path: databricks
      target: test
      environment_name: DataBricks-Test
      run_post_deployment_tests: true
      post_deploy_summary_output: both
      run_post_deploy_smoke: true
      smoke_mode: bundle-run
      smoke_job_key: smoke
      run_post_deploy_bundle_jobs: true
      post_deploy_bundle_jobs_json: |
        [
          {
            "job_key": "quality_scorecard_deploy",
            "params": {
              "env": "test"
            }
          },
          {
            "job_key": "maturity_collect",
            "params": {
              "env": "test",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}",
              "git_ref": "${{ github.ref }}",
              "workflow_run_id": "${{ github.run_id }}",
              "bundle_name": "sundt_edm_maturity"
            }
          },
          {
            "job_key": "maturity_ci_check",
            "params": {
              "env": "test",
              "enforcement_mode": "warn",
              "maturity_override": "${{ github.event.inputs.maturity_override || 'none' }}"
            }
          },
          {
            "job_key": "maturity_scorecard_status_load",
            "params": {
              "env": "test",
              "updated_by": "bundle"
            }
          },
          {
            "job_key": "maturity_scorecard_eval",
            "params": {
              "env": "test",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}"
            }
          },
          {
            "job_key": "maturity_scorecard_evidence_stub",
            "params": {
              "env": "test",
              "write_mode": "dry_run",
              "updated_by": "evidence_stub"
            }
          }
        ]
      promote_artifact_only: false
    secrets:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}

  cd_prod:
    if: ${{ github.event_name == 'push' && github.ref_name == 'prod' }}
    name: cd-prod
    needs: [unit_tests, bundle_validate_prod]
    uses: EricAustinBarber/sundt-edm-cicd-platform/.github/workflows/reusable-databricks.yml@81cdf941de0fae03687fe5cc7bba08c3501dd183
    with:
      mode: cd-prod
      bundle_path: databricks
      target: prod
      environment_name: DataBricks-Prod
      run_post_deployment_tests: true
      post_deploy_summary_output: both
      run_post_deploy_smoke: true
      smoke_mode: bundle-run
      smoke_job_key: smoke
      run_post_deploy_bundle_jobs: true
      post_deploy_bundle_jobs_json: |
        [
          {
            "job_key": "quality_scorecard_deploy",
            "params": {
              "env": "prod"
            }
          },
          {
            "job_key": "maturity_scorecard_status_load",
            "params": {
              "env": "prod",
              "updated_by": "bundle"
            }
          },
          {
            "job_key": "maturity_scorecard_eval",
            "params": {
              "env": "prod",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}"
            }
          }
        ]
      promote_artifact_only: false
    secrets:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
