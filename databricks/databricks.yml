# databricks.yml
bundle:
  name: sundt_edm_maturity

sync:
  include:
    - resources/**
    - validation_driver/**

include:
  - resources/*.yml

variables:
  quality_catalog:
    default: dev
  quality_schema_raw:
    default: bronze
  quality_schema_staging:
    default: silver
  quality_schema_mart:
    default: governance_mart

permissions:
  - group_name: users
    level: CAN_MANAGE

targets:
  dev:
    default: true
    variables:
      quality_catalog: dev
      quality_schema_raw: bronze
      quality_schema_staging: silver
      quality_schema_mart: governance_mart
    workspace:
      root_path: /Workspace/Shared/sundt-edm-maturity/dev/${bundle.name}
  test:
    variables:
      quality_catalog: test
      quality_schema_raw: bronze
      quality_schema_staging: silver
      quality_schema_mart: governance_mart
    workspace:
      root_path: /Workspace/Shared/sundt-edm-maturity/test/${bundle.name}
  prod:
    variables:
      quality_catalog: prod
      quality_schema_raw: bronze
      quality_schema_staging: silver
      quality_schema_mart: governance_mart
    workspace:
      root_path: /Workspace/Shared/sundt-edm-maturity/prod/${bundle.name}
