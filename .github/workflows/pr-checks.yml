# pr-checks.yml
name: PR-Checks

on:
  pull_request:
    branches: [dev, test, prod]

permissions:
  contents: read

jobs:
  unit_tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements.dev.txt
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  bundle_validate_dev:
    if: ${{ github.base_ref == 'dev' }}
    name: bundle-validate-dev
    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: DataBricks-Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.277.0
        with:
          version: 0.277.0
      - name: Validate bundle (dev)
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev

  bundle_validate_test:
    if: ${{ github.base_ref == 'test' || github.base_ref == 'prod' }}
    name: bundle-validate-test
    needs: [unit_tests]
    runs-on: ubuntu-latest
    environment: DataBricks-Test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.277.0
        with:
          version: 0.277.0
      - name: Validate bundle (test)
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t test
